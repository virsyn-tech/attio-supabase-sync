name: Sync Attio to Agent Reports

on:
  # Run daily at 12 PM IST (6:30 AM UTC)
  schedule:
    - cron: '30 6 * * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  sync:
    name: Sync Merchants to Agent Reports
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run sync script
        env:
          ATTIO_API_KEY: ${{ secrets.ATTIO_API_KEY }}
          AGENT_REPORTS_SUPABASE_URL: ${{ secrets.AGENT_REPORTS_SUPABASE_URL }}
          AGENT_REPORTS_SUPABASE_KEY: ${{ secrets.AGENT_REPORTS_SUPABASE_KEY }}
        run: python sync_attio_to_agent_reports.py

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Agent Reports Sync Failed - ' + new Date().toISOString().split('T')[0],
              body: `The daily Attio to Agent Reports sync failed.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\n**Time:** ${new Date().toISOString()}\n\nPlease check the logs for details.`,
              labels: ['sync-failure']
            })
